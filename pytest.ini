[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: pruebas unitarias sin red ni BD
    api: pruebas de endpoints REST con TestClient
    postventa: Release 1 — baja (unsuscription) y modificación (modification)
    parity: paridad funcional Komands vs BluePlanet (prioridad #1)
    security: autenticación, RBAC y feature flags
    nokia: OLTs Nokia ISAM 7360 FX (nokia_sros)
    huawei: OLTs Huawei MA5800/MA5600T (huawei_vrp)
    ftth: producto FTTH residencial (INTERNET, VOIP, IPTV)
    ssaa: producto SSAA B2B (grupos A/B/C/D/E/BX/DX)
    slow: tests que requieren conexión real a OLT o BD
    mock_only: dependen de centinelas del mock o de respx — no corren contra servidor real
    e2e: flujo end-to-end completo de ciclo de vida (Alta→Modificación→Cambio ONT→Baja)
    integration: tests contra Axway APIM PRE-PROD real (requiere red y token OAuth2)

addopts =
    --strict-markers
    -v
    --tb=short
    --cov=komands
    --cov-report=term-missing
    --html=reporte.html
    --self-contained-html

log_file = logs/test_execution.log
log_file_level = INFO
log_file_format = %(asctime)s  %(levelname)-8s  %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
