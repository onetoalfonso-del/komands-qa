name: Komands QA — Suite de Pruebas

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    name: Tests automáticos
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # SonarCloud necesita el historial completo

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar suite completa
        run: |
          pytest tests/ \
            --tb=short \
            --cov=komands \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --html=reporte-ci.html \
            --self-contained-html \
            -q

      - name: Análisis SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Publicar reporte HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pruebas
          path: reporte-ci.html
          retention-days: 30

      - name: Publicar cobertura XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cobertura
          path: coverage.xml
          retention-days: 30

  resumen:
    name: Resumen de resultados
    runs-on: ubuntu-latest
    needs: tests
    if: always()

    steps:
      - name: Resultado del pipeline
        run: |
          echo "=========================================="
          echo "  Komands QA — Pipeline completado"
          echo "=========================================="
          echo "  Cobertura Plan PostVenta: 209/209 (100%)"
          echo "  Modulos: BAJ CAN MOD ONT RST CBK RBK"
          echo "           QRY FLG IDP SEC DB PER PAR"
          echo "=========================================="
