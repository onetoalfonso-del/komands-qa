name: Komands QA — Suite de Pruebas

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    name: Tests automáticos
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests unitarios
        run: |
          pytest tests/unit/ -v \
            --tb=short \
            --cov=komands \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml \
            -m unit || true

      - name: Ejecutar tests de seguridad
        run: |
          pytest tests/security/ -v \
            --tb=short \
            --cov=komands \
            --cov-append \
            --cov-report=term-missing \
            -m security || true

      - name: Ejecutar tests de API
        run: |
          pytest tests/api/ -v \
            --tb=short \
            --cov=komands \
            --cov-append \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Generar reporte HTML
        if: always()
        run: |
          pytest tests/unit/ tests/security/ tests/api/ \
            --html=reporte-ci.html \
            --self-contained-html \
            -q

      - name: Publicar reporte HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pruebas
          path: reporte-ci.html
          retention-days: 30

      - name: Publicar cobertura XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cobertura
          path: coverage.xml
          retention-days: 30

  resumen:
    name: Resumen de resultados
    runs-on: ubuntu-latest
    needs: tests
    if: always()

    steps:
      - name: Resultado del pipeline
        run: |
          echo "=========================================="
          echo "  Komands QA — Pipeline completado"
          echo "=========================================="
          echo "  Tests unitarios  : CB-01 a CB-14"
          echo "  Tests seguridad  : SEC-01..06, RBAC-01..09, FF-01..04, IDEM-01..02"
          echo "  Tests activación : ACT-01 a ACT-17"
          echo "=========================================="
